name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    name: make ci
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"
          cache: true
          cache-dependency-path: |
            go.sum
            examples/*/go.sum

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "26.0.0"
          cache: npm
          cache-dependency-path: |
            examples/tailwind/package-lock.json
            examples/alpine/package-lock.json

      - name: Run CI
        run: make ci
