{{ define "content" }}
<main
  class="mx-auto grid min-h-screen w-full max-w-5xl place-items-center px-4 py-16"
>
  <section class="rounded-lg border border-line bg-panel p-8 shadow-sm">
    <p class="text-sm font-bold uppercase tracking-[0.2em] text-ember">
      Tailwind example
    </p>
    <h1 class="mt-4 max-w-3xl text-5xl font-black tracking-tight text-ink">
      Petra renders the HTML. Vite builds the Tailwind asset.
    </h1>
    <p class="mt-5 max-w-2xl text-lg leading-8 text-muted">
      This app exists only to show the asset path. It avoids routers,
      controllers, Alpine, and form handling on purpose.
    </p>
    <a class="button mt-8" href="/">Reload the page</a>
  </section>
</main>
{{ end }}
