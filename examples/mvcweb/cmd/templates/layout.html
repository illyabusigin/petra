<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ .Title }}</title>
    <link rel="stylesheet" href="/static/app.css" />
  </head>
  <body>
    {{ nav . }}
    <main class="page">
      {{ block "content" . }}{{ end }}

    {{ footer . }}

      <script src="/_reload/client.js"></script>
    {{ end }}
  </body>
</html>
